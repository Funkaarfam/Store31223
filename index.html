<!DOCTYPE html>
<html>
<head>

<title id="siteTitle">My Practice Site</title>

<style>

body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
color:white;
background-size:cover;
background-position:center;
}

.container{
text-align:center;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:10px;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
background:#4CAF50;
color:white;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#45a049;
}

</style>

</head>

<body id="body">

<div class="container">

<h1 id="homeTitle">Welcome to My Website</h1>

<br>

<button onclick="location.href='login.html'">Login</button>

</div>

<script>

let savedTitle = localStorage.getItem("title")
let savedBg = localStorage.getItem("bg")

if(savedTitle){
document.getElementById("homeTitle").innerText = savedTitle
}

if(savedBg){
document.body.style.backgroundImage = `url('${savedBg}')`
}

</script>

</body>
</html>
