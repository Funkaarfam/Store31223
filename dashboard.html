<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<style>

body{
font-family:Arial;
background:#111827;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.panel{
background:#1f2937;
padding:40px;
border-radius:10px;
width:400px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#22c55e;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="panel">

<h2>Dashboard</h2>

<label>Homepage Title</label>
<input id="titleInput" placeholder="New title">

<label>Background Image URL</label>
<input id="bgInput" placeholder="Image URL">

<button onclick="save()">Save Changes</button>

</div>

<script>

function save(){

let title=document.getElementById("titleInput").value
let bg=document.getElementById("bgInput").value

localStorage.setItem("title",title)
localStorage.setItem("bg",bg)

alert("Saved! Refresh homepage.")

}

</script>

</body>
</html>
